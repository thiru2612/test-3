name: validate
on:
  pull_request:
    types:
      - labeled

jobs:
  test:
    if: ${{ github.event.label.name == 'validate' }}
    runs-on: ubuntu-latest
    steps:
      - name: validate
        uses: actions/github-script@v7
        with:
          script: |
            if (context.payload.label.name === "bug") {
              core.setFailed('This is a bug');
            }